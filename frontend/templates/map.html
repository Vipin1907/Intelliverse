<!doctype html>
<html>
  <head>
    <title>Complaint Heatmap</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
    <style>
      #map {
        height: 500px;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <h3 class="text-center">Complaint Heatmap</h3>
    <div id="map"></div>

    <script>
      // ✅ Step 1: Map initialize
      var map = L.map('map').setView([26.8467, 80.9462], 12); // Lucknow center
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

      // ✅ Step 2: Flask se data aayega
      var heatData = {{ heatmap_points | tojson }};

      // ✅ Step 3: Heatmap layer add karo
      L.heatLayer(heatData, {
        radius: 25,
        gradient: {0.2: 'green', 0.5: 'yellow', 1.0: 'red'}
      }).addTo(map);
    </script>
  </body>
</html>
